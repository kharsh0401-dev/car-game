<!DOCTYPE html>
<html>
<head>
<title>Car Game Fixed</title>
<style>
body { margin:0; overflow:hidden; background:#0f172a; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let car = { x:100, y:300, w:50, h:30, dy:0 };
let gravity = 0.6;
let ground = canvas.height - 80;

let coins = [];

function spawnCoin(){
  coins.push({
    x: canvas.width,
    y: ground - Math.random()*150,
    r:10
  });
}

function drawGround(){
  ctx.fillStyle = "#22c55e";
  ctx.fillRect(0, ground, canvas.width, 80);
}

function drawCar(){
  ctx.fillStyle = "cyan";
  ctx.fillRect(car.x, car.y, car.w, car.h);
}

function drawCoins(){
  ctx.fillStyle = "gold";
  coins.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
    ctx.fill();
  });
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // gravity
  car.dy += gravity;
  car.y += car.dy;

  if(car.y > ground - car.h){
    car.y = ground - car.h;
    car.dy = 0;
  }

  coins.forEach(c=> c.x -= 4);

  drawGround();
  drawCar();
  drawCoins();

  requestAnimationFrame(update);
}

document.addEventListener("keydown", e=>{
  if(e.code==="Space"){
    car.dy = -12;
  }
});

setInterval(spawnCoin,1500);

update();
</script>

</body>
</html>
